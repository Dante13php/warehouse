; ---------------------------------------------------------------------------
; PgBouncer configuration for Warehouse local dev.
; Sits in front of PostgreSQL; FastAPI connects here on port 6432.
; ---------------------------------------------------------------------------

[databases]
; Route the application database through to the postgres container.
; Connection auth is handled per-user via userlist.txt.
aton_clients = host=postgres port=5432 dbname=aton_clients

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling: a server connection is assigned to a client only for
; the duration of a transaction. Required for high concurrency with FastAPI.
pool_mode = transaction

; Pool sizing (overridable via env in compose if needed)
max_client_conn = 200
default_pool_size = 25

; Admin / stats access
admin_users = warehouse
stats_users = warehouse

; Logging
log_connections = 1
log_disconnections = 1

; Health: PgBouncer must support SHOW commands on the virtual `pgbouncer` db
ignore_startup_parameters = extra_float_digits
